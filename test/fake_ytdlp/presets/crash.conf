# ══════════════════════════════════════════════════════════════════════════════
# PRESET: crash.conf
# Process exits with code 1 after 10 seconds.
# Tests that jj-dlp detects the unexpected exit and re-enters the check loop.
# ══════════════════════════════════════════════════════════════════════════════

[Mode]
mode = downloader

[Checker]
streamers_live = alice
delay_seconds  = 0.3

[Downloader]
stream_duration_seconds = 600
write_interval_seconds  = 0.5
chunk_bytes             = 8192
exit_code               = 0

[Stall]
enabled             = False
stall_after_seconds = 10

[FfmpegErrors]
timestamp_discontinuity                  = False
timestamp_discontinuity_interval_seconds = 0.5
timestamp_discontinuity_count            = 600
packet_corrupt                           = False
packet_corrupt_interval_seconds          = 0.5
packet_corrupt_count                     = 600

[Progress]
enabled          = True
interval_seconds = 2.0

[SlowStart]
enabled       = False
delay_seconds = 8.0

[CrashTest]
enabled             = True
crash_after_seconds = 10
exit_code           = 1
