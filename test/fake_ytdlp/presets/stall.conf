# ══════════════════════════════════════════════════════════════════════════════
# PRESET: stall.conf
# Stream writes data for 15s then stops — process stays alive.
# jj-dlp's stall detector (STALL_TIMEOUT) must notice and restart.
#
# Suggested jj-dlp settings to pair with this:
#   STALL_TIMEOUT         = 20   (seconds without growth → restart)
#   STALL_CHECK_INTERVAL  = 5
# ══════════════════════════════════════════════════════════════════════════════

[Mode]
mode = downloader

[Checker]
streamers_live = alice
delay_seconds  = 0.3

[Downloader]
stream_duration_seconds = 600
write_interval_seconds  = 1.0
chunk_bytes             = 8192
exit_code               = 0

[Stall]
enabled             = True
stall_after_seconds = 15

[FfmpegErrors]
timestamp_discontinuity                  = False
timestamp_discontinuity_interval_seconds = 0.5
timestamp_discontinuity_count            = 600
packet_corrupt                           = False
packet_corrupt_interval_seconds          = 0.5
packet_corrupt_count                     = 600

[Progress]
enabled          = True
interval_seconds = 2.0

[SlowStart]
enabled       = False
delay_seconds = 8.0

[CrashTest]
enabled             = False
crash_after_seconds = 15
exit_code           = 1
