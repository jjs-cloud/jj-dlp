# ══════════════════════════════════════════════════════════════════════════════
# PRESET: ffmpeg_packet_corrupt.conf
# Floods stderr with "Packet corrupt" lines at ~2/s.
# ══════════════════════════════════════════════════════════════════════════════

[Mode]
mode = downloader

[Checker]
streamers_live = alice
delay_seconds  = 0.3

[Downloader]
stream_duration_seconds = 600
write_interval_seconds  = 1.0
chunk_bytes             = 8192
exit_code               = 0

[Stall]
enabled             = False
stall_after_seconds = 10

[FfmpegErrors]
timestamp_discontinuity                  = False
timestamp_discontinuity_interval_seconds = 0.5
timestamp_discontinuity_count            = 600
packet_corrupt                           = True
packet_corrupt_interval_seconds          = 0.5
packet_corrupt_count                     = 600

[Progress]
enabled          = True
interval_seconds = 2.0

[SlowStart]
enabled       = False
delay_seconds = 8.0

[CrashTest]
enabled             = False
crash_after_seconds = 15
exit_code           = 1
