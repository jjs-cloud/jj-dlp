[General]

# Comma-separated list of disk drives / mount points to display in the System panel.
# Example (Windows): C:\,D:\    Example (Linux/Mac): /home,/mnt/data
DISK_DRIVES =

# Set to true to write a debug log for troubleshooting.
DEBUG_LOGS = false

# Path for the debug log file. Leave blank to use the default location.
DEBUG_LOG_PATH =

# Set to false to disable the automatic update check on startup.  You can update manually with "python jj-dlp --update"
CHECK_FOR_UPDATES = true

# Set to false to skip the browser-cookie picker at startup.
ASK_FOR_BROWSER = true
